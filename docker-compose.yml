version: '3.8'

services:
  # ─── Infrastructure ────────────────────────────────────────────

  mysql:
    image: mysql:8.0
    container_name: food-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./db-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - food-network

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: food-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - food-network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: food-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 15s
      timeout: 10s
      retries: 10
    networks:
      - food-network

  # ─── Eureka Server ─────────────────────────────────────────────

  eureka-server:
    build: ./infrastructure/eureka-server
    container_name: eureka-server
    ports:
      - "8761:8761"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8761/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - food-network

  # ─── API Gateway ───────────────────────────────────────────────

  api-gateway:
    build: ./infrastructure/api-gateway
    container_name: api-gateway
    ports:
      - "8080:8080"
    environment:
      EUREKA_URL: http://eureka-server:8761/eureka/
      JWT_SECRET: mySecretKeyForJWTTokenGenerationThatIsAtLeast256BitsLong2024
      FRONTEND_URL: http://localhost:3000
    depends_on:
      eureka-server:
        condition: service_healthy
    networks:
      - food-network

  # ─── User Service ──────────────────────────────────────────────

  user-service:
    build: ./services/user-service
    container_name: user-service
    ports:
      - "8081:8081"
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: root
      MYSQL_PASSWORD: root
      EUREKA_URL: http://eureka-server:8761/eureka/
      JWT_SECRET: mySecretKeyForJWTTokenGenerationThatIsAtLeast256BitsLong2024
      JWT_EXPIRATION: 86400000
    depends_on:
      mysql:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    networks:
      - food-network

  # ─── Restaurant Service ────────────────────────────────────────

  restaurant-service:
    build: ./services/restaurant-service
    container_name: restaurant-service
    ports:
      - "8082:8082"
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: root
      MYSQL_PASSWORD: root
      EUREKA_URL: http://eureka-server:8761/eureka/
    depends_on:
      mysql:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    networks:
      - food-network

  # ─── Order Service ─────────────────────────────────────────────

  order-service:
    build: ./services/order-service
    container_name: order-service
    ports:
      - "8083:8083"
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: root
      MYSQL_PASSWORD: root
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      EUREKA_URL: http://eureka-server:8761/eureka/
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    networks:
      - food-network

  # ─── Payment Service ───────────────────────────────────────────

  payment-service:
    build: ./services/payment-service
    container_name: payment-service
    ports:
      - "8084:8084"
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: root
      MYSQL_PASSWORD: root
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      EUREKA_URL: http://eureka-server:8761/eureka/
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    networks:
      - food-network

  # ─── Delivery Service ──────────────────────────────────────────

  delivery-service:
    build: ./services/delivery-service
    container_name: delivery-service
    ports:
      - "8085:8085"
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: root
      MYSQL_PASSWORD: root
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      EUREKA_URL: http://eureka-server:8761/eureka/
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    networks:
      - food-network

  # ─── Notification Service ──────────────────────────────────────

  notification-service:
    build: ./services/notification-service
    container_name: notification-service
    ports:
      - "8086:8086"
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: root
      MYSQL_PASSWORD: root
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      EUREKA_URL: http://eureka-server:8761/eureka/
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    networks:
      - food-network

  # ─── Frontend ──────────────────────────────────────────────────

  frontend:
    build: ./frontend
    container_name: food-frontend
    ports:
      - "3000:80"
    depends_on:
      - api-gateway
    networks:
      - food-network

volumes:
  mysql-data:

networks:
  food-network:
    driver: bridge
